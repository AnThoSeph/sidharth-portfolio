<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="robots" content="noindex" />
  <title>Admin | SIDHARTH KV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/admin.css" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    (function () {
      "use strict";

      var ALLOWED_EMAILS = [
        "sidhu500sidhu@gmail.com",
        "anshual005@gmail.com",
      ];

      function isAllowed(email) {
        if (!email) return false;
        return ALLOWED_EMAILS.indexOf(String(email).trim().toLowerCase()) !== -1;
      }

      function denyAccess(message) {
        if (window.netlifyIdentity) {
          window.netlifyIdentity.logout();
        }
        document.body.innerHTML =
          '<div class="sid-access-denied">' +
          '<div class="sid-access-denied__inner">' +
          '<h1>Access denied</h1>' +
          '<p>' + message + '</p>' +
          '<a href="/">← Back to site</a>' +
          '</div></div>';
      }

      function guardUser(user) {
        if (!user) return;
        if (!isAllowed(user.email)) {
          denyAccess(
            "This admin panel is only available to authorized Google accounts."
          );
        }
      }

      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function (user) {
          guardUser(user);
        });
        window.netlifyIdentity.on("login", function (user) {
          guardUser(user);
        });
      }
    })();
  </script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script src="/admin/admin-init.js"></script>
</body>
</html>
