# Static portfolio — no build step
[build]
  publish = "."
  functions = "netlify/functions"

# SPA-style fallbacks for clean URLs (optional)
# Case study pages — /project/hibiki → project.html?slug=hibiki
[[redirects]]
  from = "/project/*"
  to = "/project.html?slug=:splat"
  status = 200

[[redirects]]
  from = "/project"
  to = "/project.html"
  status = 200

[[redirects]]
  from = "/projects"
  to = "/projects.html"
  status = 200

[[redirects]]
  from = "/studio"
  to = "/about.html"
  status = 301

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Decap CMS admin config (must be served as YAML)
[[headers]]
  for = "/admin/config.yml"
  [headers.values]
    Content-Type = "text/yaml; charset=utf-8"

[[headers]]
  for = "/admin/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=3600"

# GLB models — correct MIME for 3D viewer
[[headers]]
  for = "/*.glb"
  [headers.values]
    Content-Type = "model/gltf-binary"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/assets/**/*.glb"
  [headers.values]
    Content-Type = "model/gltf-binary"
    Access-Control-Allow-Origin = "*"

# Long cache for static assets (filenames are content-addressed by folder)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/assets/**/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
    Content-Type = "image/webp"
